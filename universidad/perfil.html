<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Perfil | Portal Universitario</title>

  <link rel="stylesheet" href="styles/perfil.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <div id="sidebar"></div>

  <main class="main-content">
    <div id="header"></div>

    <section class="page-content">

      <!-- HERO PERFIL -->
      <section class="profile-hero">
        <div class="profile-background"></div>

        <div class="profile-content">

          <!-- AVATAR -->
          <div class="profile-avatar-section">
            <div class="profile-avatar-container">
              <img 
                id="fotoPerfil" 
                src="/public/images/default-avatar.jpg" 
                alt="Foto de perfil"
                class="avatar-img"
              >

              <label for="fotoInput" class="edit-btn" title="Cambiar foto">
                <i class="fas fa-camera"></i>
              </label>

              <input 
                type="file" 
                id="fotoInput" 
                accept="image/*" 
                hidden
              >

              <div class="avatar-status online"></div>
            </div>

            <div class="profile-level">
              <i class="fas fa-star"></i>
              <span>Nivel 3</span>
            </div>
          </div>

          <!-- INFO PRINCIPAL -->
          <div class="profile-main-info">

            <div class="profile-name-section">
              <h1 id="nombreCompleto">Cargando...</h1>

              <div class="profile-role">
                <span class="role-badge">Estudiante</span>
                <span id="programaBadge" class="programa-badge">-</span>
              </div>
            </div>

            <div class="profile-stats-grid">
              <div class="stat-profile">
                <div id="creditosMatriculados" class="stat-number">-</div>
                <div class="stat-label">Créditos</div>
              </div>

              <div class="stat-profile">
                <div id="semestreActual" class="stat-number">-</div>
                <div class="stat-label">Semestre</div>
              </div>

              <div class="stat-profile">
                <div id="promedioGeneral" class="stat-number gradient-text">-</div>
                <div class="stat-label">Promedio</div>
              </div>

              <div class="stat-profile">
                <div id="asistencia" class="stat-number">-</div>
                <div class="stat-label">Asistencia</div>
              </div>
            </div>

          </div>
        </div>
      </section>

      <!-- TABS -->
      <nav class="profile-tabs" id="profileTabs">
        <button class="tab-btn active" data-tab="personal" type="button">
          <i class="fas fa-user"></i> Personal
        </button>

        <button class="tab-btn" data-tab="academico" type="button">
          <i class="fas fa-graduation-cap"></i> Académico
        </button>

        <button class="tab-btn" data-tab="contacto" type="button">
          <i class="fas fa-building"></i> Institucional
        </button>

        <button class="tab-btn" data-tab="historial" type="button">
          <i class="fas fa-chart-bar"></i> Historial
        </button>
      </nav>

      <!-- CONTENIDO -->
      <section class="profile-tabs-content">

        <!-- PERSONAL -->
        <article class="tab-content active" id="tab-personal">
          <div class="card">
            <div class="card-header">
              <h3><i class="fas fa-id-card"></i> Información Personal</h3>
            </div>

            <div class="profile-info-grid">
              <div class="info-row">
                <label>Código:</label>
                <span id="codigoEstudiantil">-</span>
              </div>

              <div class="info-row">
                <label>Fecha Nacimiento:</label>
                <span id="fechaNacimiento">-</span>
              </div>

              <div class="info-row">
                <label>Teléfono:</label>
                <span id="telefono">-</span>
              </div>

              <div class="info-row">
                <label>Correo:</label>
                <span id="correoPersonal">-</span>
              </div>
            </div>
          </div>
        </article>

        <!-- ACADÉMICO -->
        <article class="tab-content" id="tab-academico">
          <div class="card">
            <div class="card-header">
              <h3><i class="fas fa-graduation-cap"></i> Información Académica</h3>
            </div>

            <div class="profile-info-grid">
              <div class="info-row">
                <label>Programa:</label>
                <span id="programaAcademico">-</span>
              </div>

              <div class="info-row">
                <label>Fecha Ingreso:</label>
                <span id="fechaIngreso">-</span>
              </div>
            </div>
          </div>
        </article>

        <!-- CONTACTO -->
        <article class="tab-content" id="tab-contacto">
          <div class="card">
            <div class="card-header">
              <h3><i class="fas fa-building"></i> Institucional</h3>
            </div>

            <div class="profile-info-grid">
              <div class="info-row">
                <label>Correo institucional:</label>
                <span id="correoInstitucional">-</span>
              </div>

              <div class="info-row">
                <label>Usuario:</label>
                <span id="usuario">-</span>
              </div>
            </div>
          </div>
        </article>

        <!-- HISTORIAL -->
        <article class="tab-content" id="tab-historial">
          <div class="card">
            <div class="card-header">
              <h3><i class="fas fa-chart-bar"></i> Historial</h3>
              <a href="historial-academico.html" class="view-more">Ver completo</a>
            </div>

            <div id="historialPreview" class="academic-history-grid">
              <p class="empty-state">Cargando historial...</p>
            </div>
          </div>
        </article>

      </section>

      <!-- ACCIONES -->
      <section class="profile-actions">
        <button id="btnEditarPerfil" class="btn btn-primary" type="button">
          <i class="fas fa-edit"></i> Editar
        </button>

        <button id="btnCambiarPassword" class="btn btn-secondary" type="button">
          <i class="fas fa-lock"></i> Contraseña
        </button>

        <button id="btnDescargarDatos" class="btn btn-outline" type="button">
          <i class="fas fa-download"></i> Datos
        </button>
      </section>

    </section>
  </main>

  <script type="module" src="JS/perfil.js" defer></script>

</body>
</html>
