<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Historial Académico | Portal Universitario</title>

  <link rel="stylesheet" href="styles/historial.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <div id="sidebar"></div>

  <main class="main-content">
    <div id="header"></div>

    <section class="page-content">

      <!-- HEADER -->
      <section class="page-header">
        <div>
          <h1><i class="fas fa-chart-bar"></i> Historial Académico</h1>
          <p>Rendimiento académico por periodos</p>
        </div>

        <div class="header-actions">
          <button id="btnExportarHistorial" class="btn btn-primary" type="button">
            <i class="fas fa-download"></i> Exportar
          </button>

          <button id="btnImprimirHistorial" class="btn btn-secondary" type="button">
            <i class="fas fa-print"></i> Imprimir
          </button>
        </div>
      </section>

      <!-- FILTROS -->
      <section class="filters-card card">
        <div class="filters-row">

          <div class="filter-group">
            <label for="filtroPeriodo">Periodo</label>
            <select id="filtroPeriodo">
              <option value="">Todos</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="filtroEstado">Estado</label>
            <select id="filtroEstado">
              <option value="">Todos</option>
              <option value="Aprobada">Aprobada</option>
              <option value="Reprobada">Reprobada</option>
              <option value="En curso">En curso</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="buscarMateria">Buscar</label>
            <input 
              type="text" 
              id="buscarMateria" 
              placeholder="Nombre de materia..."
            >
          </div>

          <button id="btnLimpiarHistorial" class="btn btn-outline" type="button">
            <i class="fas fa-times"></i>
          </button>

        </div>
      </section>

      <!-- STATS -->
      <section class="stats-grid">

        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-trophy"></i>
          </div>
          <div class="stat-info">
            <h3 id="promedioGeneral">-</h3>
            <p>Promedio General</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <div class="stat-info">
            <h3 id="creditosAprobados">-</h3>
            <p>Créditos Aprobados</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-book"></i>
          </div>
          <div class="stat-info">
            <h3 id="materiasAprobadas">-</h3>
            <p>Materias Aprobadas</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-exclamation-triangle"></i>
          </div>
          <div class="stat-info">
            <h3 id="materiasReprobadas">-</h3>
            <p>Materias Reprobadas</p>
          </div>
        </div>

      </section>

      <!-- HISTORIAL -->
      <section class="card">

        <header class="card-header">
          <h3><i class="fas fa-calendar-alt"></i> Periodos Académicos</h3>
        </header>

        <div id="historialContainer">

          <!-- Estado inicial -->
          <div class="empty-state">
            Cargando historial académico...
          </div>

        </div>

      </section>

    </section>
  </main>

  <script type="module" src="JS/historial.js" defer></script>

</body>
</html>
