<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gestión de materias del estudiante">

  <title>Materias | Portal Universitario</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/public/style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <div id="sidebar"></div>

  <main class="main-content">
    <div id="header"></div>

    <section class="page-content">

      <!-- HEADER -->
      <section class="page-header">
        <div class="header-content">
          <div class="header-icon blue">
            <i class="fas fa-book-open"></i>
          </div>

          <div>
            <h1>Mis Materias</h1>
            <p>Semestre 2024-I • <span id="totalMateriasDash">0</span> materias</p>
          </div>
        </div>

        <div class="header-actions">
          <button class="btn btn-primary" id="btnNuevaMateria" type="button">
            <i class="fas fa-plus"></i> Matricular
          </button>

          <button class="btn btn-secondary" id="btnExportar" type="button">
            <i class="fas fa-download"></i> Exportar
          </button>
        </div>
      </section>

      <!-- STATS -->
      <section class="materias-stats">

        <article class="stat-card small">
          <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
          <div>
            <h3 id="materiasAprobadas">0</h3>
            <p>Aprobadas</p>
          </div>
        </article>

        <article class="stat-card small">
          <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
          <div>
            <h3 id="materiasCurso">0</h3>
            <p>En curso</p>
          </div>
        </article>

        <article class="stat-card small">
          <div class="stat-icon blue"><i class="fas fa-bookmark"></i></div>
          <div>
            <h3 id="creditosTotal">0</h3>
            <p>Créditos</p>
          </div>
        </article>

      </section>

      <!-- FILTROS -->
      <section class="filters-card">
        <div class="filters-row">

          <div class="filter-group">
            <label for="filtroEstadoMateria">Estado</label>
            <select id="filtroEstadoMateria">
              <option value="">Todas</option>
              <option value="activa">Activas</option>
              <option value="finalizada">Finalizadas</option>
              <option value="reprobada">Reprobadas</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="filtroPeriodoMateria">Periodo</label>
            <select id="filtroPeriodoMateria">
              <option value="">Todos</option>
              <option value="2024-I">2024-I</option>
              <option value="2023-II">2023-II</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="buscarMateria">Buscar</label>
            <input type="text" id="buscarMateria" placeholder="Nombre o código...">
          </div>

          <button class="btn btn-primary" id="btnLimpiarFiltros" type="button">
            <i class="fas fa-times"></i>
          </button>

        </div>
      </section>

      <!-- TABLA -->
      <section class="table-container">

        <header class="table-header">
          <h2><i class="fas fa-list"></i> Materias</h2>

          <div class="table-actions">
            <span id="materiasActivas" class="stat-small">0 activas</span>

            <button id="toggleView" class="btn btn-secondary" type="button">
              <i class="fas fa-th"></i> Cambiar Vista
            </button>
          </div>
        </header>

        <!-- TABLA -->
        <div class="table-responsive table-mode active" id="tableMode">
          <table class="materias-table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Materia</th>
                <th>Docente</th>
                <th>Horario</th>
                <th>Aula</th>
                <th>Créditos</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-materias">
              <tr>
                <td colspan="8" class="empty-state">Cargando materias...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- CARDS -->
        <div class="cards-mode" id="cardsMode">
          <div id="materias-cards-container" class="materias-cards-grid">
            <p class="empty-state">Sin datos</p>
          </div>
        </div>

      </section>

      <!-- HORARIO -->
      <section class="horario-section">
        <article class="card">
          <header class="card-header">
            <h3><i class="fas fa-calendar-week"></i> Horario Semanal</h3>
          </header>

          <div id="horarioSemanal" class="horario-grid">
            <p class="empty-state">Cargando horario...</p>
          </div>
        </article>
      </section>

    </section>
  </main>

  <script type="module" src="/public/main.js" defer></script>

</body>
</html>
