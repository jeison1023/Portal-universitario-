<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Portal Universitario</title>

  <link rel="stylesheet" href="/universidad/public/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <!-- Sidebar dinámico -->
  <div id="sidebar"></div>

  <main class="main-content">

    <!-- Header dinámico -->
    <div id="header"></div>

    <div class="page-content">

      <!-- Stats dinámicos -->
      <div id="statsContainer" class="dashboard-stats"></div>

      <!-- Grid dinámico -->
      <div class="dashboard-grid">

        <div class="card">
          <h3>Próximas Clases</h3>
          <div id="classesContainer"></div>
        </div>

        <div class="card">
          <h3>Notificaciones</h3>
          <ul id="notificationsContainer"></ul>
        </div>

      </div>

    </div>
  </main>

  <script type="module" src="/universidad/public/main.js"></script>
</body>
</html>
