<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitudes | Portal Universitario</title>

  <link rel="stylesheet" href="/universidad/public/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <div id="sidebar"></div>

  <main class="main-content">

    <div id="header"></div>

    <div class="page-content">

      <div class="solicitudes-header">
        <h2>Mis Solicitudes</h2>

        <button id="btnNuevaSolicitud" class="btn-primary">
          <i class="fas fa-plus"></i> Nueva Solicitud
        </button>
      </div>

      <div id="solicitudesContainer" class="solicitudes-grid"></div>

    </div>
  </main>

  <!-- Modal -->
  <div id="modalSolicitud" class="modal">
    <div class="modal-content">

      <div class="modal-header">
        <h3>Nueva Solicitud</h3>
        <button id="closeModal" class="close-modal">&times;</button>
      </div>

      <form id="formSolicitud" class="solicitud-form">
        <select id="tipoSolicitud" required>
          <option value="">Tipo de Solicitud</option>
          <option>Certificado</option>
          <option>Convalidación</option>
        </select>

        <textarea id="descripcion" placeholder="Descripción" required></textarea>

        <button type="submit" class="btn-primary">
          Enviar
        </button>
      </form>

    </div>
  </div>

  <script type="module" src="/universidad/public/main.js"></script>
</body>
</html>
