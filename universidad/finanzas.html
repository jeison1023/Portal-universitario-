<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas | UNI-PORTAL</title>
    <link rel="stylesheet" href="styles/finanzas.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>UNI-PORTAL</span>
            </div>
            <button class="mobile-close"><i class="fas fa-times"></i></button>
        </div>

        <nav class="nav-container">
            <ul class="nav-list">
                <li><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="materias.html" class="nav-link"><i class="fas fa-book"></i> Materias</a></li>
                <li><a href="calificaciones.html" class="nav-link"><i class="fas fa-poll-h"></i> Calificaciones</a></li>
                <li><a href="horarios.html" class="nav-link"><i class="far fa-calendar-alt"></i> Horarios</a></li>
                <li><a href="historial.html" class="nav-link"><i class="fas fa-history"></i> Historial</a></li>
                <li><a href="solicitudes.html" class="nav-link"><i class="far fa-file-alt"></i> Solicitudes</a></li>
                <li><a href="finanzas.html" class="nav-link active"><i class="fas fa-dollar-sign"></i> Finanzas</a></li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Juan+Perez&background=2563eb&color=fff" alt="Perfil" class="user-avatar">
                <div class="user-info">
                    <span class="user-name">Juan Pérez</span>
                    <span class="user-role">ID: 2024-01030</span>
                </div>
            </div>
            <button id="logoutBtn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar sesión
            </button>
        </div>
    </aside>

    <div class="main-container">
        <header class="main-header">
            <div class="header-left">
                <button class="mobile-toggle"><i class="fas fa-bars"></i></button>
                <h1 class="page-title">Módulo de Finanzas</h1>
            </div>
            <div class="header-right">
                <span class="current-date"><i class="far fa-calendar"></i> Abril 2026</span>
            </div>
        </header>

        <main class="main-content">
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
                    <div class="stat-data">
                        <h3 id="pendientesCount">0</h3>
                        <p>Pendientes</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-data">
                        <h3 id="pagadosCount">0</h3>
                        <p>Pagados</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-wallet"></i></div>
                    <div class="stat-data">
                        <h3 id="totalMatricula">$0</h3>
                        <p>Balance Total</p>
                    </div>
                </div>
            </section>

            <div class="dashboard-grid">
                <div class="card table-card">
                    <div class="card-header">
                        <h3>Historial de Pagos</h3>
                        <select id="filtroEstadoPago" class="custom-select">
                            <option value="">Todos los estados</option>
                            <option value="pendiente">Pendientes</option>
                            <option value="pagado">Pagados</option>
                            <option value="atrasado">Atrasados</option>
                        </select>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Concepto</th>
                                    <th>Monto</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaPagos"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card chart-card">
                    <div class="card-header">
                        <h3>Distribución</h3>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="finanzasChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="JS/finanzas.js"></script>
</body>
</html>
