<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Consulta de calificaciones del estudiante">

  <title>Calificaciones | Portal Universitario</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/public/style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <div id="sidebar"></div>

  <main class="main-content">
    <div id="header"></div>

    <section class="page-content">

      <!-- HEADER -->
      <section class="page-header">
        <div class="header-content">
          <div class="header-icon">
            <i class="fas fa-chart-line"></i>
          </div>

          <div>
            <h1>Calificaciones</h1>
            <p>Tus resultados académicos por periodo</p>
          </div>
        </div>

        <div class="header-actions">
          <button class="btn btn-secondary" id="btnExportarPDF" type="button">
            <i class="fas fa-download"></i> Exportar
          </button>

          <button class="btn btn-secondary" id="btnImprimir" type="button">
            <i class="fas fa-print"></i> Imprimir
          </button>
        </div>
      </section>

      <!-- STATS -->
      <section class="stats-grid" id="statsContainer">
        <!-- JS dinámico -->
      </section>

      <!-- FILTROS -->
      <section class="filters-card">
        <div class="filters-row">

          <div class="filter-group">
            <label for="filtroPeriodo">Periodo</label>
            <select id="filtroPeriodo">
              <option value="">Todos</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="filtroEstado">Estado</label>
            <select id="filtroEstado">
              <option value="">Todos</option>
              <option value="Aprobada">Aprobada</option>
              <option value="Reprobada">Reprobada</option>
              <option value="En curso">En curso</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="buscarMateria">Buscar</label>
            <input 
              type="text" 
              id="buscarMateria" 
              placeholder="Nombre de la materia..."
            >
          </div>

          <button class="btn btn-primary" id="btnLimpiarFiltros" type="button">
            <i class="fas fa-times"></i>
          </button>

        </div>
      </section>

      <!-- TABLA -->
      <section class="table-container">

        <header class="table-header">
          <h2><i class="fas fa-table"></i> Detalle</h2>

          <div class="table-actions">
            <span id="totalMaterias" class="stat-small">0 materias</span>
            <span id="promedioActual" class="stat-small">Promedio: 0.0</span>
          </div>
        </header>

        <div class="table-responsive">
          <table class="calificaciones-table">
            <thead>
              <tr>
                <th>Materia</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Parcial</th>
                <th>Final</th>
                <th>Promedio</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>

            <tbody id="tabla-calificaciones">
              <tr>
                <td colspan="8" class="empty-state">
                  Cargando calificaciones...
                </td>
              </tr>
            </tbody>

          </table>
        </div>
      </section>

      <!-- GRÁFICO -->
      <section class="chart-container">
        <article class="card">

          <header class="card-header">
            <h3><i class="fas fa-chart-pie"></i> Rendimiento</h3>
          </header>

          <div id="graficoResumen" class="chart-placeholder">
            <canvas id="chartCanvas"></canvas>
          </div>

        </article>
      </section>

    </section>
  </main>

  <script type="module" src="/public/main.js" defer></script>

</body>
</html>
