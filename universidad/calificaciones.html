<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calificaciones | Portal Universitario</title>

  <link rel="stylesheet" href="/universidad/public/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <div id="sidebar"></div>

  <main class="main-content">

    <div id="header"></div>

    <div class="page-content">

      <div id="statsContainer" class="stats-row"></div>

      <div class="table-container">
        <div class="table-header">
          <h2>Calificaciones</h2>

          <select id="periodo" class="periodo-select"></select>
        </div>

        <div class="table-responsive">
          <table class="calificaciones-table">
            <thead>
              <tr>
                <th>Materia</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Parcial</th>
                <th>Final</th>
                <th>Promedio</th>
                <th>Estado</th>
              </tr>
            </thead>

            <tbody id="tabla-calificaciones"></tbody>

          </table>
        </div>
      </div>

    </div>
  </main>

  <script type="module" src="/universidad/public/main.js"></script>
</body>
</html>
